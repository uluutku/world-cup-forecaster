name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          pip install -r requirements.lock
          pip install -e ".[dev]" --no-deps
      - name: Reproduce release artifacts
        run: |
          python -m worldcup_predictor.pipeline --refresh --simulations 5000
          python -m worldcup_predictor.advanced_pipeline
          python scripts/build_release_bundle.py --version "${GITHUB_REF_NAME}"
      - name: Validate
        run: |
          ruff check .
          pytest -q
          worldcup-artifacts --verify
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/world-cup-forecaster-"${GITHUB_REF_NAME}".zip \
            dist/world-cup-forecaster-"${GITHUB_REF_NAME}".zip.sha256 \
            --generate-notes \
            --title "World Cup Forecaster ${GITHUB_REF_NAME}"
