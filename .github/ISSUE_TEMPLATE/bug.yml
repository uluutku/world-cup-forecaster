name: Bug report
description: Report a reproducible defect
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Commands, inputs and artifact version.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS and Python version.
    validations:
      required: true
